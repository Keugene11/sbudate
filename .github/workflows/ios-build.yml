name: iOS Build & Upload to App Store

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Install Fastlane
        run: gem install fastlane

      - name: Build & Upload with Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          VERSION: ${{ github.event.inputs.version }}
          TEAM_ID: SDA728W6D9
        run: |
          cd ios/App
          cat > Fastfile << 'RUBY'
          default_platform(:ios)

          platform :ios do
            desc "Build and upload to App Store Connect"
            lane :release do
              api_key = app_store_connect_api_key(
                key_id: ENV["APP_STORE_CONNECT_API_KEY_ID"],
                issuer_id: ENV["APP_STORE_CONNECT_ISSUER_ID"],
                key_filepath: File.expand_path("~/.private_keys/AuthKey_#{ENV['APP_STORE_CONNECT_API_KEY_ID']}.p8"),
              )

              increment_build_number(
                build_number: ENV["BUILD_NUMBER"],
                xcodeproj: "App.xcodeproj"
              )

              increment_version_number(
                version_number: ENV["VERSION"],
                xcodeproj: "App.xcodeproj"
              )

              update_code_signing_settings(
                use_automatic_signing: true,
                team_id: ENV["TEAM_ID"],
                path: "App.xcodeproj"
              )

              build_app(
                project: "App.xcodeproj",
                scheme: "App",
                destination: "generic/platform=iOS",
                export_method: "app-store",
                export_options: {
                  signingStyle: "automatic",
                },
                xcargs: "-authenticationKeyPath '#{File.expand_path("~/.private_keys/AuthKey_#{ENV['APP_STORE_CONNECT_API_KEY_ID']}.p8")}' -authenticationKeyID '#{ENV['APP_STORE_CONNECT_API_KEY_ID']}' -authenticationKeyIssuerID '#{ENV['APP_STORE_CONNECT_ISSUER_ID']}' -allowProvisioningUpdates",
              )

              upload_to_app_store(
                api_key: api_key,
                skip_metadata: true,
                skip_screenshots: true,
                force: true,
              )
            end
          end
          RUBY
          fastlane release

      - name: Cleanup
        if: always()
        run: rm -rf ~/.private_keys 2>/dev/null || true
