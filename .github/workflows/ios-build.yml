name: iOS Build & Upload to App Store

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Create keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Build & Upload with Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
          VERSION: ${{ github.event.inputs.version }}
          TEAM_ID: SDA728W6D9
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          cd ios/App
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)

          platform :ios do
            lane :release do
              api_key = app_store_connect_api_key(
                key_id: ENV["APP_STORE_CONNECT_API_KEY_ID"],
                issuer_id: ENV["APP_STORE_CONNECT_ISSUER_ID"],
                key_filepath: File.expand_path("~/.private_keys/AuthKey_#{ENV['APP_STORE_CONNECT_API_KEY_ID']}.p8"),
              )

              cert(
                api_key: api_key,
                team_id: ENV["TEAM_ID"],
                keychain_path: ENV["KEYCHAIN_PATH"],
                keychain_password: ENV["KEYCHAIN_PASSWORD"],
                force: true,
              )

              sigh(
                api_key: api_key,
                team_id: ENV["TEAM_ID"],
                app_identifier: "com.sbudate.app",
                readonly: false,
              )

              profile_uuid = lane_context[SharedValues::SIGH_UUID]
              profile_name = lane_context[SharedValues::SIGH_NAME]

              update_code_signing_settings(
                use_automatic_signing: false,
                team_id: ENV["TEAM_ID"],
                path: "App.xcodeproj",
                code_sign_identity: "Apple Distribution",
                profile_uuid: profile_uuid,
                bundle_identifier: "com.sbudate.app",
              )

              increment_build_number(
                build_number: ENV["BUILD_NUMBER"],
                xcodeproj: "App.xcodeproj"
              )

              increment_version_number(
                version_number: ENV["VERSION"],
                xcodeproj: "App.xcodeproj"
              )

              build_app(
                project: "App.xcodeproj",
                scheme: "App",
                destination: "generic/platform=iOS",
                export_method: "app-store",
                xcargs: "PROVISIONING_PROFILE_SPECIFIER='#{profile_name}'",
              )

              upload_to_app_store(
                api_key: api_key,
                skip_metadata: true,
                skip_screenshots: true,
                precheck_include_in_app_purchases: false,
                force: true,
              )
            end
          end
          RUBY
          fastlane release

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true
