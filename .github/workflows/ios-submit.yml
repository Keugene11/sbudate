name: Submit to App Store Review

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Upload metadata
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: SDA728W6D9
        run: |
          cd ios/App
          mkdir -p fastlane
          cat > fastlane/Fastfile << 'RUBY'
          default_platform(:ios)

          platform :ios do
            lane :submit do
              api_key = app_store_connect_api_key(
                key_id: ENV["APP_STORE_CONNECT_API_KEY_ID"],
                issuer_id: ENV["APP_STORE_CONNECT_ISSUER_ID"],
                key_filepath: File.expand_path("~/.private_keys/AuthKey_#{ENV['APP_STORE_CONNECT_API_KEY_ID']}.p8"),
              )

              deliver(
                api_key: api_key,
                team_id: ENV["TEAM_ID"],
                app_identifier: "com.sbudate.app",
                app_version: "1.0.0",
                skip_binary_upload: true,
                skip_screenshots: true,
                precheck_include_in_app_purchases: false,
                submit_for_review: false,
                force: true,
                automatic_release: true,
              )
            end
          end
          RUBY
          fastlane submit

      - name: Cleanup
        if: always()
        run: rm -rf ~/.private_keys 2>/dev/null || true
